services:
  db:
    image: postgres:15
    container_name: socialauto_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: socialauto123
      POSTGRES_DB: socialauto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: socialauto_backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: dev
      LOCAL_PATCH: "true"
      APP_AI_MODEL: claude-3-haiku-20240307
      APP_AI_BASE_URL: https://api.anthropic.com/v1/messages
      APP_AI_EXTRA_HEADERS: '{"anthropic-version": "2023-06-01", "anthropic-beta": "messages-2023-06-01"}'
      APP_AI_KEY: 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
      DATABASE_URL: postgresql://postgres:socialauto123@db:5432/socialauto
      SECRET_KEY: socialauto-secret-key-2024
      ANTHROPIC_API_KEY: **************
      OIDC_CLIENT_ID: 654776980779-c2usolpk84b2riipqh2ajp4cvn09chm6.apps.googleusercontent.com
      OIDC_CLIENT_SECRET: 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
      OIDC_ISSUER_URL: https://accounts.google.com
      OIDC_SCOPE: openid email profile
      JWT_SECRET_KEY: socialauto-jwt-secret-2024
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      PYTHON_BACKEND_URL: http://localhost:8000
      ADMIN_EMAIL: PEGA_TU_EMAIL_DE_GOOGLE
      ADMIN_USER_ID: admin
    depends_on:
      - db
    volumes:
      - ./app/backend:/app
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: socialauto_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
volumes:
  postgres_data:
